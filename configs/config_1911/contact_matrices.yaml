# Contact matrices for the 1911 simulation (Spanish flu / historical scenario).
#
# This file is read directly by the simulator. Edit it by hand to change
# contact rates or transmission probabilities.
#
# ---------------------------------------------------------------------------
# What each venue declares
# ---------------------------------------------------------------------------
# Each venue has two transmission modes:
#   respiratory      : non-physical (airborne / droplet) contact
#   physical_contact : physical (touching) contact
#
# Each mode has three fields:
#   beta     - per-mode transmission rate at this venue.
#   bins     - subset names within the venue.
#   contacts - matrix of contacts per person per day, indexed
#              [observer_bin][other_bin]. Same units as the original
#              contact-survey data.
#
# At config-load time the parser multiplies them together:
#   effective_C[s,i] = beta * contacts[s][i]
#
# Translated from the legacy single-mode 1911/contact_matrices.yaml using
# the same convention as config_2021/contact_matrices_new.yaml:
#
#   Uniform-p venues (workplaces, pub, church):
#     beta_resp = beta_venue / T_c * (1 - p)
#     beta_phys = beta_venue / T_c * p * alpha   (alpha = 2.0)
#     contacts unchanged (raw counts)
#
#   Non-uniform-p venues (classroom, household, medical):
#     beta_resp = beta_venue / T_c
#     beta_phys = beta_venue / T_c * alpha
#     contacts split per mode: C_resp = C*(1-p), C_phys = C*p
#
# disease.yaml's transmission.modes block declares both modes with
# susceptibility_multiplier 1.0 each (alpha is folded into beta_phys here).
#
default_contacts_matrix:
  modes:
    respiratory:
      beta: 0.041666666666666664
      bins: [all]
      contacts:
      - [20]
    physical_contact:
      beta: 0.0
      bins: [all]
      contacts:
      - [20]
