# Infection Seeding Configuration
# Controls how and when infections are introduced into the simulation

global_parameters:
  default_seed_strength: 1.0
  base_cases_per_capita: 0.0002

infection_seeds:
  # Single uniform seeding event
  - name: "basic_seeding"
    type: "uniform"
    date: "2024-01-01 08:00"
    parameters:
      cases_per_capita_multiplier: 1.0

