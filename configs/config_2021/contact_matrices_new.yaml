# Contact matrices for COVID-19 2021 simulation
# Generated by tools/translate_contact_matrices.ipynb
# Source: configs/config_2021/orig_contact_matrices_uk.yaml
#
# Two transmission modes. Per-mode beta absorbs beta/T_c and prop_physical/alpha:
#
#   Uniform prop_physical venues:
#     beta_resp = beta / T_c * (1 - p)
#     beta_phys = beta / T_c * p * alpha
#     C_resp[s,i] = C_phys[s,i] = C[s,i]  (unchanged)
#
#   Non-uniform prop_physical venues (care_home, classroom, household, hospital):
#     beta_resp = beta / T_c
#     beta_phys = beta / T_c * alpha
#     C_resp[s,i] = C[s,i] * (1 - p[s,i])
#     C_phys[s,i] = C[s,i] * p[s,i]
#
# Force-of-infection identity (exact equivalence to old formula):
#   (beta_resp*C_resp + beta_phys*C_phys) * I*dt/N  ==  C*beta/Tc*(1+(a-1)*p) * I*dt/N
#
# mode_susceptibility_multipliers: [1.0, 1.0] (disease.yaml) — alpha in beta_phys
#
default_contacts_matrix:
  modes:
    respiratory:
      beta: 0.0375
      bins: [all]
      contacts:
      - [20]
    physical_contact:
      beta: 0.0083333333
      bins: [all]
      contacts:
      - [20]
