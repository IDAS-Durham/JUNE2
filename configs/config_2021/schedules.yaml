# Schedule Configuration - With Aligned Boundaries
# All schedule types share the SAME time slot boundaries

day_type_cycle: [weekday, weekday, weekday, weekday, weekday, weekend, weekend]  # Mon-Fri, Sat-Sun

default_schedule_type: "has_primary_activity"

# ============================================================================
# SCHEDULE TYPES - Same time boundaries, different activities
# ============================================================================

schedule_types:

  # -------------------------------------------------------------------------
  # Non-worker - People with no primary activity (job/school)
  # -------------------------------------------------------------------------
  no_primary_activity:
    priority: 10

    # Match people with zero primary activities
    selection:
      - property: "activities.primary_activity.length"
        operator: "=="
        value: 0

    weekday:
      - name: "morning"
        start: "08:00"
        end: "09:00"
        allowed_activities: ["residence"]

      - name: "daytime_leisure"
        start: "09:00"
        end: "17:00"
        allowed_activities: ["leisure", "residence"]

      - name: "evening_commute"
        start: "17:00"
        end: "18:00"
        allowed_activities: ["leisure","residence"]

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["leisure", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    weekend:
      - name: "morning"
        start: "08:00"
        end: "12:00"
        allowed_activities: ["leisure", "residence"]

      - name: "day"
        start: "12:00"
        end: "16:00"
        allowed_activities: ["leisure", "residence"]

      - name: "afternoon"
        start: "16:00"
        end: "18:00"
        allowed_activities: ["leisure", "residence"]

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["leisure", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    participation:
      leisure:
        weekday: 0.4
        weekend: 0.5
      residence:
        weekday: 1.0
        weekend: 1.0

  # -------------------------------------------------------------------------
  # Has primary_activity (workers). Split into three priority-ordered variants
  # selected by `properties.work_mode` so attendance can be tuned per mode.
  # MAY's distributors place EVERY worker
  # with a workplace_sgu into a primary_activity venue regardless of
  # work_mode; the schedule layer gates whether the worker actually attends.
  # work_mode values emitted by MAY: Normal, Hybrid, From_Home, Other, "" (non-
  # workers fall to no_primary_activity at priority 10).
  #
  # All variants share identical slot lists (anchored on this fallback type).
  # Only `participation` differs — Normal 1.0, Hybrid 0.6, From_Home 0.
  # -------------------------------------------------------------------------
  has_primary_activity:
    priority: 0

    # No selection criteria = matches everyone as fallback
    # (Normal workers, Other, and any worker without a work_mode override).
    selection: []

    weekday: &has_primary_activity_weekday
      - name: "morning_commute"
        start: "08:00"
        end: "09:00"
        allowed_activities: ["commute", "no_venue", "residence"]

      - name: "primary_activity"
        start: "09:00"
        end: "17:00"
        allowed_activities: ["primary_activity", "residence"]

      - name: "evening_commute"
        start: "17:00"
        end: "18:00"
        allowed_activities: ["commute", "no_venue", "residence"]

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["leisure", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    weekend: &has_primary_activity_weekend
      - name: "morning"
        start: "08:00"
        end: "12:00"
        allowed_activities: ["leisure", "residence"]

      - name: "day"
        start: "12:00"
        end: "16:00"
        allowed_activities: ["leisure", "residence"]

      - name: "afternoon"
        start: "16:00"
        end: "18:00"
        allowed_activities: ["leisure", "residence"]

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["leisure", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    participation:
      primary_activity:
        weekday: 1.0
        weekend: 0.0
      commute:
        weekday: 1.0
        weekend: 0.0
      # Individual-mode commuters (walk/bike/car/etc) have no transport_line
      # venue, so `commute` is unavailable for them; they pass through to
      # `no_venue` (in transit, no FOI) instead of going home.
      no_venue:
        weekday: 1.0
        weekend: 0.0
      leisure:
        weekday: 0.3
        weekend: 0.5
      residence:
        weekday: 1.0
        weekend: 1.0

  # Hybrid workers: attend office (and therefore commute) ~60% of weekdays.
  # 0.6 is a starting guess — calibrate against empirical hybrid-work
  # attendance data.
  has_primary_activity_hybrid:
    priority: 2
    selection:
      - property: "properties.work_mode"
        operator: "=="
        value: "Hybrid"

    # Link commute / no_venue / primary_activity via a single per-day dice
    # roll. If a Hybrid worker is "in" today they commute (or transit
    # individually) AND attend the office; if not, they stay at residence all
    # weekday. Implies hybrid (re-rolled at runtime, not frozen by the
    # precomputed-schedule fast path used by Normal workers).
    linked_activities: ["commute", "no_venue", "primary_activity"]

    weekday: *has_primary_activity_weekday
    weekend: *has_primary_activity_weekend

    participation:
      primary_activity:
        weekday: 0.6
        weekend: 0.0
      commute:
        weekday: 0.6
        weekend: 0.0
      no_venue:
        weekday: 0.6
        weekend: 0.0
      leisure:
        weekday: 0.3
        weekend: 0.5
      residence:
        weekday: 1.0
        weekend: 1.0

  # From_Home workers: never attend their assigned workplace, never commute.
  # MAY still assigns them a primary_activity venue — this schedule simply
  # zeroes participation so they remain at residence on weekdays.
  has_primary_activity_from_home:
    priority: 3
    selection:
      - property: "properties.work_mode"
        operator: "=="
        value: "From_Home"

    weekday: *has_primary_activity_weekday
    weekend: *has_primary_activity_weekend

    participation:
      primary_activity:
        weekday: 0.0
        weekend: 0.0
      commute:
        weekday: 0.0
        weekend: 0.0
      no_venue:
        weekday: 0.0
        weekend: 0.0
      leisure:
        weekday: 0.3
        weekend: 0.5
      residence:
        weekday: 1.0
        weekend: 1.0
