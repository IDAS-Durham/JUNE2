# Schedule Configuration - With Aligned Boundaries
# All schedule types share the SAME time slot boundaries

day_type_cycle: [weekday, weekday, weekday, weekday, weekday, weekend, weekend]  # Mon-Fri, Sat-Sun

default_schedule_type: "has_primary_activity"

# ============================================================================
# SCHEDULE TYPES - Same time boundaries, different activities
# ============================================================================

schedule_types:

  # -------------------------------------------------------------------------
  # Non-worker - People with no primary activity (job/school)
  # -------------------------------------------------------------------------
  no_primary_activity:
    priority: 10

    # Match people with zero primary activities
    selection:
      - property: "activities.primary_activity.length"
        operator: "=="
        value: 0

    weekday:
      - name: "morning"
        start: "08:00"
        end: "09:00"
        allowed_activities: ["residence"]

      - name: "daytime_leisure"
        start: "09:00"
        end: "17:00"
        allowed_activities: ["leisure", "residence"]

      - name: "evening_commute"
        start: "17:00"
        end: "18:00"
        allowed_activities: ["leisure","residence"]

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["leisure", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    weekend:
      - name: "morning"
        start: "08:00"
        end: "12:00"
        allowed_activities: ["leisure", "residence"]

      - name: "day"
        start: "12:00"
        end: "16:00"
        allowed_activities: ["leisure", "residence"]

      - name: "afternoon"
        start: "16:00"
        end: "18:00"
        allowed_activities: ["leisure", "residence"]

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["leisure", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    participation:
      leisure:
        weekday: 0.4
        weekend: 0.5
      residence:
        weekday: 1.0
        weekend: 1.0

  # -------------------------------------------------------------------------
  has_primary_activity:
    priority: 0

    # No selection criteria = matches everyone as fallback
    selection: []

    weekday:
      - name: "morning"
        start: "08:00"
        end: "09:00"
        allowed_activities: ["residence"]

      - name: "primary_activity"
        start: "09:00"
        end: "17:00"
        allowed_activities: ["primary_activity", "residence"]

      - name: "evening_commute"
        start: "17:00"
        end: "18:00"
        allowed_activities: ["residence"]

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["leisure", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    weekend:
      - name: "morning"
        start: "08:00"
        end: "12:00"
        allowed_activities: ["leisure", "residence"]

      - name: "day"
        start: "12:00"
        end: "16:00"
        allowed_activities: ["leisure", "residence"]

      - name: "afternoon"
        start: "16:00"
        end: "18:00"
        allowed_activities: ["leisure", "residence"]

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["leisure", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    participation:
      primary_activity:
        weekday: 1.0
        weekend: 0.0
      leisure:
        weekday: 0.3
        weekend: 0.5
      residence:
        weekday: 1.0
        weekend: 1.0
