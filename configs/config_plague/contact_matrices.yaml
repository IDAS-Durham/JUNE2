# Contact matrices for plague simulation
#
# Two venue types: household, land
# Two transmission modes: animal_bite (flea/rat vector), respiratory (droplet)
#
# Each ContactMatrix entry contains:
#   bins     - subset names (single bin "all" used here)
#   contacts - mean contacts per delta_t; enters force-of-infection as:
#              Omega = delta_t * C / N_bin
#

# ── Fallback matrix ───────────────────────────────────────────────────────────
# Used whenever a (venue, mode) pair has no explicit entry.
# Required — the simulation exits if this is absent and a fallback is needed.
default_contacts_matrix:
  bins: ["all"]
  contacts: [[1.0]]

default_contacts: 1.0

# ── Per-venue, per-mode matrices ──────────────────────────────────────────────
contact_matrices:

  household:
    modes:
      animal_bite:
        # Rats nest in thatch roofs and walls; fleas are endemic in medieval homes.
        bins: ["all"]
        contacts: [[1.0]]

      respiratory:
        # Household members share a small, poorly ventilated space.
        bins: ["all"]
        contacts: [[1.0]]

  church:
    modes:
      animal_bite:
        bins: ["male", "female"]
        contacts:
          - [1.0, 0.2]
          - [0.2, 1.0]
      respiratory:
        bins: ["male", "female"]
        contacts:
          - [1.0, 0.5]
          - [0.5, 1.0]

  land:
    modes:
      animal_bite:
        # Rats present in grain stores and open fields; exposure during working hours.
        bins: ["0-12", "male", "female"]
        contacts:
          - [0.33, 0.13, 0.13]
          - [0.13, 0.23, 0.13]
          - [0.13, 0.13, 0.23]	  

      respiratory:
        # Outdoor work gives more space; respiratory spread is lower than indoors.
        bins: ["0-12", "male", "female"]
        contacts:
          - [0.23, 0.05, 0.05]
          - [0.05, 0.05, 0.05]	  
          - [0.05, 0.05, 0.13]


