# Performance Optimization Configuration
# This file controls performance optimizations for the June epidemic simulation

performance:
  # Enable schedule pre-computation (Phase 1 optimization)
  precompute_schedules: true

  # Option 1: List deterministic activities (Balanced Mode)
  # These activities will be pre-computed once and cached.
  # All other activities (leisure, social, etc.) will be computed stochastically at runtime,
  # saving significant memory compared to pre-computing everything.
  deterministic_activities:
    - "residence"
    - "primary_activity"

  # Active infection tracking
  # When enabled, only infected people are tracked for state updates
  track_active_infections_only: true
