# ODE config for the rat-flea plague compartmental model plugin.
# Passed to PlagueRatsJunePlugin::initialise() as config_path.
# Uses the same YAML schema as the standalone plague_rats simulation.

simulation:
  t_end: 730.0      # days — generous upper bound; june controls actual end
  dt: 0.25           # internal sub-step size in days (Euler integrator)
  integrator: euler

input:
  graph_h5: "data/data_plague/combined_graph.h5"          # set to absolute path of combined_graph.h5
  initial_state_h5: "data/data_plague/initial_state.h5"  # set to absolute path of initial_state.h5

