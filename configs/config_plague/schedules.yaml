# GENERATED SAILING SCHEDULES
# Append this block to configs/config_plague/schedules.yaml under schedule_types.
# Generated by tools/generate_sailing_schedules.py
# =============================================================================

  # ---- Regular base schedule for sailors ----
  # --------------------------------------------------------------------------
  # SAILOR  (port-dwellers assigned to sea trade routes)
  # Priority 7 overrides traveller (6): a sailor takes sailing behaviour.
  # On each workday primary_activity slot there is a 0.3 probability of
  # selecting 'begin_sailing', which triggers a C++ property-dispatched hop to
  # sailing_Nday_trip (N = person.properties['num_sailing_days']).
  # No hop_on_activity entry is needed; no venue mapping for begin_sailing.
  # --------------------------------------------------------------------------
  sailor:
    priority: 7
    selection:
      - property: "num_sailing_days"
        operator: ">"
        value: 0

    workday:
      - name: "morning"
        start: "08:00"
        end: "09:00"
        allowed_activities: ["residence"]

      - name: "primary_activity"
        start: "09:00"
        end: "17:00"
        allowed_activities: ["begin_sailing", "primary_activity", "residence"]
        # begin_sailing precedes primary_activity so the 0.3 sailing draw fires
        # first; if it fails the 1.0-rate primary_activity fallback wins.
        hop_on_activity:
          begin_sailing:
            property: "num_sailing_days"
            schedule_template: "sailing_{value}day_trip"

      - name: "evening"
        start: "17:00"
        end: "21:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    rest_day:
      - name: "morning"
        start: "09:00"
        end: "12:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near", "residence"]

      - name: "day"
        start: "12:00"
        end: "18:00"
        allowed_activities: ["church", "primary_activity", "social_contacts_local",
                             "social_contacts_near", "social_contacts_med",
                             "social_contacts_far", "residence"]

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near", "residence"]

      - name: "night"
        start: "21:00"
        end: "09:00"
        allowed_activities: ["residence"]

    participation:
      primary_activity:
        workday: 1.0    # fallback when the 0.3 begin_sailing draw fails
        rest_day: 0.2
      begin_sailing:
        workday: 0.3
        rest_day: 0.0
      church:
        workday: 0.0
        rest_day: 0.8
      social_contacts_local:
        workday: 0.10
        rest_day: 0.10
      social_contacts_near:
        workday: 0.10
        rest_day: 0.10
      social_contacts_med:
        workday: 0.0
        rest_day: 0.03
      social_contacts_far:
        workday: 0.0
        rest_day: 0.01
      residence:
        workday: 1.0
        rest_day: 1.0

  # ---- Temporary sailing schedules (one per unique num_sailing_days) ----
  # 1-day sea voyage (11 flat_slots = 4×2×1 + 3)
  sailing_1day_trip:
    is_temporary: true
    # return_schedule omitted → reverts to person's own original schedule

    flat_slots:
