  # ---- Regular base schedule for travellers ----
  # --------------------------------------------------------------------------
  # TRAVELLER  (pilgrims and long-distance travellers with pre-planned routes)
  # Priority 6 overrides merchant (5): merchant-travellers get pilgrim behaviour.
  # On each workday primary_activity slot there is a 0.3 probability of
  # selecting 'begin_travel', which triggers a C++ property-dispatched hop to
  # travel_Nday_trip (N = person.properties['num_travel_days']).
  # No hop_on_activity entry is needed; no venue mapping for begin_travel.
  # --------------------------------------------------------------------------
  traveller:
    priority: 6
    selection:
      - property: "num_travel_days"
        operator: ">"
        value: 0

    workday:
      - name: "morning"
        start: "08:00"
        end: "09:00"
        allowed_activities: ["residence"]

      - name: "primary_activity"
        start: "09:00"
        end: "17:00"
        allowed_activities: ["begin_travel", "primary_activity", "residence"]
        # begin_travel precedes primary_activity so the 0.3 travel draw fires
        # first; if it fails the 1.0-rate primary_activity fallback wins.
        # The property-dispatch hop is defined entirely in YAML: no activity
        # name or property name is hard-coded in C++.
        hop_on_activity:
          begin_travel:
            property: "num_travel_days"
            schedule_template: "travel_{value}day_trip"

      - name: "evening"
        start: "17:00"
        end: "21:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    rest_day:
      - name: "morning"
        start: "09:00"
        end: "12:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near", "residence"]

      - name: "day"
        start: "12:00"
        end: "18:00"
        allowed_activities: ["church", "primary_activity", "social_contacts_local",
                             "social_contacts_near", "social_contacts_med",
                             "social_contacts_far", "residence"]

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near", "residence"]

      - name: "night"
        start: "21:00"
        end: "09:00"
        allowed_activities: ["residence"]

    participation:
      primary_activity:
        workday: 1.0    # fallback when the 0.3 begin_travel draw fails
        rest_day: 0.2
      begin_travel:
        workday: 0.3
        rest_day: 0.0
      church:
        workday: 0.0
