coordinated_encounters:
  enabled: false
  log_commitments: false
  encounters:
    - name: "social_encounters"
      priority: 10
      enabled: true
      network: "friendships"
      trigger_slots: ["leisure"]
      allowed_venues: ["pub", "cinema"]
      daily_max_distribution:
        type: poisson
        mean: 1.5
      proposal_probability: 0.05
      invite_distribution:
        type: binomial
        p: 0.3
      acceptance_probability: 0.8
      is_virtual: false
