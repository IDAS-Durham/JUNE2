time:
  start_date: "1348-01-01"
  end_date: "1349-01-01"
  
config_paths:
# Configuration paths
  disease_file: "configs/config_plague_fitting/disease_plague.yaml"
  contact_matrices_file: "configs/config_plague_fitting/contact_matrices.yaml"
  schedules_file: "configs/config_plague_fitting/schedules.yaml"
  vaccines_file: "configs/config_plague_fitting/vaccines.yaml"
  activity_preferences_file: "configs/config_plague_fitting/activity_preferences.yaml"
  coordinated_encounters_file: "configs/config_plague_fitting/coordinated_encounters.yaml"
  performance_file: "configs/config_plague_fitting/performance.yaml"
  parallel_file: "configs/config_plague_fitting/parallel.yaml"
  policies_file: "configs/config_plague_fitting/policies.yaml"
  infection_seeds_file: "configs/config_plague_fitting/infection_seeds.yaml"

# Random seeds for reproducibility
random_seed: 1348

verbose: true

output:
  stats_interval_days: 1          # Output statistics every N days
  track_by_age_group: true
  track_by_venue_type: true
  track_by_geography: true
  flush_interval_days: 7
  max_event_buffer_size: 1000000

  age_groups:
    - { name: "0-4", min: 0, max: 4 }
    - { name: "5-17", min: 5, max: 17 }
    - { name: "18-64", min: 18, max: 64 }
    - { name: "65+", min: 65, max: 99 }

