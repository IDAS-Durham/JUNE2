# Activity Preference Profiles
# ----------------------------
# These weights control WHICH venue category a person chooses when
# they have multiple options for a specific activity.

profiles:
  # ---------------------------------------------------------
  # LEISURE PREFERENCES
  # ---------------------------------------------------------
  
  # 1. Young Adult Males: High preference for Gym and Pub
  - name: "Young Males (Leisure)"
    activity: "leisure"
    priority: 10
    selection:
      - property: "age"
        operator: "<"
        value: 30
      - property: "sex"
        operator: "=="
        value: "M"
    weights:
      gym: 5.0
      pub: 3.0
      cinema: 2.0
      grocery: 0.5

  # 2. Young Adult Females: High preference for Gym and Cinema
  - name: "Young Females (Leisure)"
    activity: "leisure"
    priority: 10
    selection:
      - property: "age"
        operator: "<"
        value: 30
      - property: "sex"
        operator: "=="
        value: "F"
    weights:
      gym: 4.0
      cinema: 4.0
      pub: 2.0
      grocery: 1.0

  # 3. Seniors: High preference for Groceries and Cinema, low Gym
  - name: "Seniors (Leisure)"
    activity: "leisure"
    priority: 5
    selection:
      - property: "age"
        operator: ">"
        value: 65
    weights:
      grocery: 5.0
      cinema: 3.0
      pub: 1.0
      gym: 0.1

  # ---------------------------------------------------------
  # DEFAULT / FALLBACK
  # ---------------------------------------------------------
  - name: "Default"
    activity: "" # Empty means applies to ALL activities if no higher priority match
    priority: 0
    selection: [] 
    weights:
      pub: 1.0
      cinema: 1.0
      gym: 1.0
      grocery: 1.0
      residence: 1.0
