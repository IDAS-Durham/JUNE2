# Output configuration for HDF5 event files

output:
  # HDF5 compression level (0-9)
  # 0 = no compression
  # 6 = balanced (recommended)
  # 9 = maximum compression (slower)
  compression_level: 6

  # Person lookup table saving mode
  # "all"           = Save all people (original behavior, large files)
  # "infected_only" = Save only infected people (recommended, 95% smaller)
  # "none"          = Don't save person lookup table
  save_full_person_details: "infected_only"

  # Population summary: minimal demographic data for all people
  # This provides denominators for attack rates while using minimal space
  # (~16 bytes per person vs ~228 bytes for full details)
  save_population_summary: true

  # Person activities table saving mode
  # "all"           = Save all people's activities (very large)
  # "infected_only" = Save only infected people's activities (recommended)
  # "none"          = Don't save activities (smallest, recommended unless needed)
  save_person_activities: "none"
