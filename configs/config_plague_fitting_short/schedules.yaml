# Schedule Configuration - Medieval Plague World
# All non-temporary schedule types MUST share identical slot time boundaries.
#
# Travel mechanic (hop_on_activity):
#   When a person is *assigned* a travel activity during a normal slot, they
#   immediately hop to a temporary schedule.  flat_slots[0] replaces the
#   triggering slot; subsequent flat_slots run one-per-simulation-slot until
#   exhausted, then the person auto-returns to their original schedule.
#
#   social_contacts_med  →  day_trip  (4 flat_slots: rest of today + morning home)
#   social_contacts_far  →  long_trip (8 flat_slots: two nights away)
#
# The trigger slot must be where the travel activity can actually be selected
# (i.e. it must appear in allowed_activities and have non-zero participation).
# On workdays, only merchants can trigger a day_trip; standard workers cannot.

day_type_cycle: [workday, workday, workday, workday, workday, workday, rest_day]

default_schedule_type: "standard_worker"

# Probabilistic schedule assignment from CSV (evaluated before YAML criteria).
schedule_csv: "configs/config_plague_fitting/schedules.csv"

# ============================================================================
# TEMPORARY SCHEDULES
# Flat slot sequences: one entry consumed per simulation slot.
# is_temporary: true exempts the schedule from the slot-boundary consistency
# check and enables auto-return on completion.
# No participation rates are needed when each flat_slot has exactly one
# allowed_activity: selectActivity falls back to the sole available index.
# ============================================================================

schedule_types:

  # --------------------------------------------------------------------------
  # DAY TRIP  (triggered when social_contacts_med is selected in a normal slot)
  # 4 flat_slots.  Assuming triggered during rest_day "day" (12:00-18:00):
  #
  #  Slot  Day-type slot        Duration   Activity
  #  [0]   rest_day  "day"      6 h        social_contacts_med  ← replaces trigger
  #  [1]   rest_day  "evening"  3 h        social_contacts_med
  #  [2]   rest_day  "night"   12 h        residence (sleeping away)
  #  [3]   workday   "morning"  1 h        residence (travelling home)
  #  ──────────────────────────────────────────────────────────────────────────
  #  auto-return for workday "primary_activity" onwards
  #
  # Note: start/end on flat_slots are informational only; actual slot durations
  # come from the main schedule (schedule_types[0] for the current day type).
  # --------------------------------------------------------------------------
  day_trip:
    is_temporary: true
    # return_schedule omitted → reverts to the person's own original schedule

    flat_slots:
      - name: "at_destination"
        start: "12:00"
        end: "18:00"
        allowed_activities: ["social_contacts_med"]

      - name: "evening_at_destination"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["social_contacts_med"]

      - name: "overnight_away"
        start: "21:00"
        end: "09:00"
        allowed_activities: ["social_contacts_med"]

      - name: "returning_home"
        start: "09:00"
        end: "12:00"
        allowed_activities: ["social_contacts_med"]

  # --------------------------------------------------------------------------
  # LONG TRIP  (triggered when social_contacts_far is selected)
  # 8 flat_slots.  Assuming triggered during rest_day "day" (12:00-18:00):
  #
  #  Slot  Day-type slot          Duration   Activity
  #  [0]   rest_day   "day"       6 h        social_contacts_far ← replaces trigger
  #  [1]   rest_day   "evening"   3 h        social_contacts_far
  #  [2]   rest_day   "night"    12 h        residence (night 1 away)
  #  [3]   workday    "morning"   1 h        social_contacts_far (arrived, day 2)
  #  [4]   workday    "primary"   8 h        social_contacts_far
  #  [5]   workday    "evening"   4 h        social_contacts_far
  #  [6]   workday    "night"    11 h        residence (night 2 away)
  #  [7]   workday+1  "morning"   1 h        residence (travelling home)
  #  ──────────────────────────────────────────────────────────────────────────
  #  auto-return for workday+1 "primary_activity" onwards
  # --------------------------------------------------------------------------
  long_trip:
    is_temporary: true

    flat_slots:
      - name: "travelling_to_destination"
        start: "12:00"
        end: "18:00"
        allowed_activities: ["social_contacts_far"]

      - name: "evening_at_destination_d1"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["social_contacts_far"]

      - name: "overnight_away_n1"
        start: "21:00"
        end: "09:00"
        allowed_activities: ["social_contacts_far"]

      - name: "morning_at_destination_d2"
        start: "09:00"
        end: "17:00"
        allowed_activities: ["social_contacts_far"]

      - name: "afternoon_at_destination_d2"
        start: "17:00"
        end: "18:00"
        allowed_activities: ["social_contacts_far"]

      - name: "evening_at_destination_d2"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["social_contacts_far"]

      - name: "overnight_away_n2"
        start: "21:00"
        end: "09:00"
        allowed_activities: ["social_contacts_far"]

      - name: "returning_home"
        start: "09:00"
        end: "12:00"
        allowed_activities: ["social_contacts_far"]

  # ============================================================================
  # REGULAR SCHEDULE TYPES
  # All must share identical slot boundaries within each day type.
  # The simulator uses schedule_types[0]'s slot list to determine time
  # boundaries for all persons, so boundary mismatches would silently mis-time
  # other schedule types.
  # ============================================================================

  # --------------------------------------------------------------------------
  # STANDARD WORKER  (farmers, labourers, craftspeople — the default)
  # --------------------------------------------------------------------------
  standard_worker:
    priority: 1
    selection: []     # catch-all fallback

    workday:
      - name: "morning"
        start: "08:00"
        end: "09:00"
        allowed_activities: ["residence"]

      - name: "primary_activity"
        start: "09:00"
        end: "17:00"
        allowed_activities: ["primary_activity", "residence"]

      - name: "evening"
        start: "17:00"
        end: "21:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    rest_day:
      - name: "morning"
        start: "09:00"
        end: "12:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near", "residence"]

      - name: "day"
        start: "12:00"
        end: "18:00"
        allowed_activities: ["church", "primary_activity", "social_contacts_local",
                             "social_contacts_near", "social_contacts_med",
                             "social_contacts_far", "residence"]
        # Hop triggers: if the stochastic draw lands on a travel activity,
        # replace this slot with flat_slots[0] of the temporary schedule and
        # progress through the remaining flat_slots on subsequent simulation slots.
        hop_on_activity:
          social_contacts_med: day_trip
          social_contacts_far: long_trip

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near",
                             "social_contacts_med", "social_contacts_far", "residence"]
        # Evening trigger: a traveller who sets out late still completes the trip;
        # the flat_slots sequence shifts accordingly (arriving after dark, etc.).
        hop_on_activity:
          social_contacts_med: day_trip
          social_contacts_far: long_trip

      - name: "night"
        start: "21:00"
        end: "09:00"
        allowed_activities: ["residence"]

    participation:
      primary_activity:
        workday: 1.0
        rest_day: 0.2
      church:
        workday: 0.01
        rest_day: 0.8
      social_contacts_local:
        workday: 0.20
        rest_day: 0.20
      social_contacts_near:
        workday: 0.10
        rest_day: 0.15
      social_contacts_med:
        workday: 0.01       # standard workers don't travel on workdays
        rest_day: 0.03     # ~3 % chance of a day trip on a rest day
      social_contacts_far:
        workday: 0.001
        rest_day: 0.01     # ~1 % chance of a long trip on a rest day
      residence:
        workday: 1.0
        rest_day: 1.0

  # --------------------------------------------------------------------------
  # MERCHANT  (traders, peddlers, travelling professionals)
  # Assigned probabilistically via schedules.csv; falls back to explicit
  # 'occupation == merchant' property if the CSV is absent.
  # Slot boundaries identical to standard_worker (required for consistency).
  # Higher travel participation; can also travel on workdays.
  # --------------------------------------------------------------------------
  merchant:
    priority: 5
    selection:
      - property: "occupation"
        operator: "=="
        value: "merchant"

    workday:
      - name: "morning"
        start: "08:00"
        end: "09:00"
        allowed_activities: ["residence"]

      - name: "primary_activity"
        start: "09:00"
        end: "17:00"
        allowed_activities: ["primary_activity", "social_contacts_near",
                             "social_contacts_med", "residence"]
        hop_on_activity:
          social_contacts_med: day_trip     # merchants travel on workdays too

      - name: "evening"
        start: "17:00"
        end: "21:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near", "residence"]

      - name: "night"
        start: "21:00"
        end: "08:00"
        allowed_activities: ["residence"]

    rest_day:
      - name: "morning"
        start: "09:00"
        end: "12:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near", "residence"]

      - name: "day"
        start: "12:00"
        end: "18:00"
        allowed_activities: ["church", "social_contacts_local", "social_contacts_near",
                             "social_contacts_med", "social_contacts_far", "residence"]
        hop_on_activity:
          social_contacts_med: day_trip
          social_contacts_far: long_trip

      - name: "evening"
        start: "18:00"
        end: "21:00"
        allowed_activities: ["social_contacts_local", "social_contacts_near",
                             "social_contacts_med", "social_contacts_far", "residence"]
        hop_on_activity:
          social_contacts_med: day_trip
          social_contacts_far: long_trip

      - name: "night"
        start: "21:00"
        end: "09:00"
        allowed_activities: ["residence"]

    participation:
      primary_activity:
        workday: 0.2        # merchants spend less time at a fixed work location
        rest_day: 0.1
      church:
        workday: 0.01
        rest_day: 0.5
      social_contacts_local:
        workday: 0.20
        rest_day: 0.15
      social_contacts_near:
        workday: 0.20       # regular trade with nearby settlements on workdays
        rest_day: 0.15
      social_contacts_med:
        workday: 0.15       # ~10 % chance of a day trip on a workday
        rest_day: 0.15      # ~15 % chance on rest days
      social_contacts_far:
        workday: 0.05
        rest_day: 0.05      # ~5 % chance of a two-day journey on a rest day
      residence:
        workday: 1.0
        rest_day: 1.0
